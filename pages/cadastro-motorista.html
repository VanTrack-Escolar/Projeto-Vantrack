<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Motorista - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/Style.css">
</head>
<body>
    <div id="notificacoes" class="container-notificacoes"></div>
    <main id="tela-cadastro">
        <div class="conteudo-cadastro">
            <header class="topo-cadastro">
                <img src="../assets/img/motorista.png" alt="Ícone motorista" class="icone-motorista">
                <h1>Cadastro Motorista</h1>
            </header>
            <section id="card-cadastro">
                <!-- Indicador de progresso de passos -->
                <div class="registration-steps">
                    <div class="step-indicator active" data-step="1">
                        <span class="step-num">1</span>
                        <span class="step-label">Pessoal</span>
                    </div>
                    <div class="step-line"></div>
                    <div class="step-indicator" data-step="2">
                        <span class="step-num">2</span>
                        <span class="step-label">CNH</span>
                    </div>
                    <div class="step-line"></div>
                    <div class="step-indicator" data-step="3">
                        <span class="step-num">3</span>
                        <span class="step-label">Veículo</span>
                    </div>
                    <div class="step-line"></div>
                    <div class="step-indicator" data-step="4">
                        <span class="step-num">4</span>
                        <span class="step-label">Escolas</span>
                    </div>
                    <div class="step-line"></div>
                    <div class="step-indicator" data-step="5">
                        <span class="step-num">5</span>
                        <span class="step-label">Revisão</span>
                    </div>
                </div>

                <form id="form-cadastro-motorista" autocomplete="off">
                    <!-- PASSO 1: DADOS PESSOAIS -->
                    <div class="step-section active" id="step-section-1">
                        <div class="campo">
                            <i class="fas fa-user"></i>
                            <input type="text" id="nome" name="nome" data-validar="nome" placeholder="Nome Completo" required>
                        </div>
                        <div class="campo">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="cpf" name="cpf" data-validar="cpf" placeholder="CPF" required>
                        </div>
                        <div class="campo">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" data-validar="email" placeholder="E-mail" required>
                        </div>
                        <div class="campo">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="telefone" name="telefone" data-validar="telefone" placeholder="Telefone" required>
                        </div>
                        <div class="campo">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" id="cidade" name="cidade" data-validar="cidade" placeholder="Cidade" required>
                        </div>
                        <div class="campo">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="senha" name="senha" data-validar="senha" placeholder="Senha" required>
                            <button type="button" class="toggle-senha" aria-label="Mostrar ou esconder senha">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="campo">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmar-senha" name="confirmar-senha" data-validar="senha" placeholder="Confirmar Senha" required>
                            <button type="button" class="toggle-senha" aria-label="Mostrar ou esconder senha">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- PASSO 2: HABILITAÇÃO (CNH) -->
                    <div class="step-section" id="step-section-2" style="display: none;">
                        <h2 class="step-title">Dados da CNH</h2>
                        <div class="campo">
                            <i class="fas fa-id-badge"></i>
                            <input type="text" id="cnh_numero" name="cnh_numero" placeholder="Número da CNH" required>
                        </div>
                        <div class="campo">
                            <i class="fas fa-list"></i>
                            <select id="cnh_categoria" name="cnh_categoria" required>
                                <option value="" disabled selected>Selecione a Categoria</option>
                                <option value="D">Categoria D (Micro-ônibus/Van)</option>
                                <option value="E">Categoria E (Articulados/Pesados)</option>
                            </select>
                            <i class="fas fa-chevron-down" style="font-size: 12px; margin-left: auto; color: var(--placeholder-gray);"></i>
                        </div>
                        <div class="campo">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="text" id="cnh_validade" name="cnh_validade" placeholder="Validade (DD/MM/AAAA)" required>
                        </div>
                    </div>

                    <!-- PASSO 3: DADOS DO VEÍCULO -->
                    <div class="step-section" id="step-section-3" style="display: none;">
                        <h2 class="step-title">Dados da Van Escolar</h2>
                        <div class="campo">
                            <i class="fas fa-car"></i>
                            <input type="text" id="veiculo_placa" name="veiculo_placa" placeholder="Placa (Ex: ABC-1234)" required>
                        </div>
                        <div class="campo">
                            <i class="fas fa-truck-monster"></i>
                            <input type="text" id="veiculo_modelo" name="veiculo_modelo" placeholder="Modelo (Ex: Sprinter 415)" required>
                        </div>
                        <div class="campo">
                            <i class="fas fa-calendar"></i>
                            <input type="number" id="veiculo_ano" name="veiculo_ano" min="2000" max="2027" placeholder="Ano de Fabricação" required>
                        </div>
                        <div class="campo">
                            <i class="fas fa-users"></i>
                            <input type="number" id="veiculo_capacidade" name="veiculo_capacidade" min="1" max="100" placeholder="Capacidade de Passageiros" required>
                        </div>
                    </div>

                    <!-- PASSO 4: ESCOLAS ATENDIDAS -->
                    <div class="step-section" id="step-section-4" style="display: none;">
                        <h2 class="step-title">Escolas Atendidas</h2>
                        <p class="step-description">Adicione as escolas ou colégios que sua van atende.</p>
                        <div class="add-school-row">
                            <div class="campo" style="flex: 1; margin-bottom: 0;">
                                <i class="fas fa-school"></i>
                                <input type="text" id="escola_input" placeholder="Nome da Escola">
                            </div>
                            <button type="button" id="btn-add-escola" class="btn-add-dynamic">Adicionar</button>
                        </div>
                        <div class="schools-tags-container" id="schools-tags">
                            <span class="no-schools-text">Nenhuma escola adicionada ainda.</span>
                        </div>
                    </div>

                    <!-- PASSO 5: REVISÃO E CONFIRMAÇÃO -->
                    <div class="step-section" id="step-section-5" style="display: none;">
                        <h2 class="step-title">Revisão do Cadastro</h2>
                        <p class="step-description">Confirme se todos os dados inseridos estão corretos.</p>
                        
                        <div class="wizard-summary-card">
                            <!-- Inserido dinamicamente pelo JS -->
                        </div>
                    </div>

                    <!-- BOTÕES DE NAVEGAÇÃO DO WIZARD -->
                    <div class="wizard-navigation">
                        <button type="button" id="btn-wizard-prev" class="btn btn-light" style="display: none; width: auto; flex: 1;">Voltar</button>
                        <button type="button" id="btn-wizard-next" class="btn btn-primary" style="width: auto; flex: 1;">Avançar</button>
                        <button type="submit" id="btn-wizard-submit" class="btn-cadastrar" style="display: none; margin-top: 0; flex: 1;">Concluir Cadastro</button>
                    </div>
                </form>
            </section>
        </div>
    </main>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/validators.js"></script>
    <script src="../assets/js/cadastro-wizard.js"></script>
</body>
</html>
