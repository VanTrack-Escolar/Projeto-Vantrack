<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <div id="notificacoes" class="container-notificacoes"></div>
    
    <div class="login-container">
        <div class="login-header">
            <img src="../assets/img/van.png.png" alt="Vantrack Logo" class="logo-van">
            <h1>Recuperar Senha</h1>
            <p>Informe seu e-mail de cadastro (Aluno ou Motorista) para receber as instruções de recuperação de senha.</p>
        </div>
        
        <div class="login-card">
            <form id="form-recuperar-senha" style="display: flex; flex-direction: column; gap: 14px;">
                <div class="form-group">
                    <div class="input-com-icone">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email-recuperar" name="email" data-validar="email" placeholder="Seu E-mail" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-login" style="margin-top: 10px; align-self: center; min-width: 160px;">Enviar</button>
            </form>
        </div>
        
        <div class="login-footer">
            <a href="index.html" class="link-footer">
                <i class="fas fa-arrow-left" style="margin-right: 6px; font-size: 0.85rem;"></i>
                Voltar para o Login
            </a>
        </div>
    </div>

    <script src="../assets/js/config.js?v=1.1"></script>
    <script src="../assets/js/validators.js"></script>
    <script src="../assets/js/login.js?v=1.1"></script>
</body>
</html>
