<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Vantrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css?v=1.4">
    <link rel="stylesheet" href="../assets/css/components.css?v=1.4">
    <link rel="stylesheet" href="../assets/css/login.css?v=1.4">
</head>
<body>
    <div id="notificacoes" class="container-notificacoes"></div>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-shield-alt fa-3x" style="color: #60a5fa; filter: drop-shadow(0 8px 24px rgba(59, 130, 246, 0.5)); animation: logoFloat 4s ease-in-out infinite;"></i>
            <h1 style="margin-top: 10px;">Área<br>Administrativa</h1>
            <p>Faça login com suas credenciais de administrador</p>
        </div>
        <div class="login-card">
            <form id="form-login-admin">
                <div class="form-group">
                    <div class="input-com-icone">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" data-validar="email" placeholder="E-mail Administrativo" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-com-icone">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="senha" name="senha" data-validar="senha" placeholder="Senha" required>
                        <button type="button" class="toggle-senha" aria-label="Mostrar ou esconder senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="lembrar" name="lembrar">
                    <label for="lembrar">Lembrar-me</label>
                </div>
                <button type="submit" class="btn-login">Entrar no Sistema</button>
            </form>
        </div>
        <div class="login-footer">
            <a href="index.html" class="link-footer"><i class="fas fa-arrow-left" style="margin-right: 6px;"></i>Voltar para o Portal do Usuário</a>
        </div>
    </div>
    <script src="../assets/js/config.js?v=1.1"></script>
    <script src="../assets/js/validators.js"></script>
    <script src="../assets/js/admin-login.js?v=1.1"></script>
</body>
</html>
